<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Top-Down</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
        }
        canvas {
            border: 2px solid #444;
        }
    </style>
</head>
<body>
    <canvas id="game" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const player = {
            x: 280,
            y: 180,
            w: 30,
            h: 30,
            color: '#00d4ff',
            speed: 4
        };

        const coins = [];
        const coinSize = 15;
        let coinTimer = 0;

        const enemies = [];
        const enemySize = 25;
        let enemyTimer = 0;
        let score = 0;

        function spawnCoin() {
            coins.push({
                x: Math.random() * (canvas.width - coinSize),
                y: Math.random() * (canvas.height - coinSize),
                w: coinSize,
                h: coinSize,
                color: '#ffd700'
            });
        }

        spawnCoin();

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            if (side === 0) { x = Math.random() * canvas.width; y = -enemySize; vx = (Math.random() - 0.5) * 2; vy = Math.random() * 2 + 1; }
            else if (side === 1) { x = canvas.width; y = Math.random() * canvas.height; vx = -(Math.random() * 2 + 1); vy = (Math.random() - 0.5) * 2; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height; vx = (Math.random() - 0.5) * 2; vy = -(Math.random() * 2 + 1); }
            else { x = -enemySize; y = Math.random() * canvas.height; vx = Math.random() * 2 + 1; vy = (Math.random() - 0.5) * 2; }
            enemies.push({ x, y, w: enemySize, h: enemySize, vx, vy, color: '#ff4444' });
        }

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function update() {
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

            coinTimer++;
            if (coinTimer > 120) {
                spawnCoin();
                coinTimer = 0;
            }

            enemyTimer++;
            if (enemyTimer > 90) {
                spawnEnemy();
                enemyTimer = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;
                if (e.x < -50 || e.x > canvas.width + 50 || e.y < -50 || e.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                    continue;
                }
                if (player.x < e.x + e.w && player.x + player.w > e.x &&
                    player.y < e.y + e.h && player.y + player.h > e.y) {
                    score = Math.max(0, score - 1);
                    enemies.splice(i, 1);
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (player.x < c.x + c.w && player.x + player.w > c.x &&
                    player.y < c.y + c.h && player.y + player.h > c.y) {
                    score++;
                    coins.splice(i, 1);
                }
            }
        }

        function drawBackground() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        function drawCoins() {
            coins.forEach(c => {
                ctx.fillStyle = c.color;
                ctx.fillRect(c.x, c.y, c.w, c.h);
            });
        }

        function drawEnemies() {
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.w, e.h);
            });
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        function loop() {
            update();
            drawBackground();
            drawPlayer();
            drawCoins();
            drawEnemies();
            drawScore();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
