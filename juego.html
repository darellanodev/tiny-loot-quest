<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Top-Down</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
        }
        canvas {
            border: 2px solid #444;
        }
    </style>
</head>
<body>
    <canvas id="game" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const player = {
            x: 280,
            y: 180,
            w: 30,
            h: 30,
            color: '#00d4ff',
            speed: 4
        };

        const coins = [];
        const coinSize = 15;
        let coinTimer = 0;

        const enemies = [];
        const enemySize = 25;
        let enemyTimer = 0;
        let score = 0;
        let gameOver = false;
        let lives = 3;
        let hasShield = false;
        let shieldTimer = 0;
        const powerups = [];
        let powerupTimer = 0;
        let difficulty = 1;

        function spawnCoin() {
            coins.push({
                x: Math.random() * (canvas.width - coinSize),
                y: Math.random() * (canvas.height - coinSize),
                w: coinSize,
                h: coinSize,
                color: '#ffd700'
            });
        }

        spawnCoin();

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            const speed = difficulty;
            let x, y, vx, vy;
            if (side === 0) { x = Math.random() * canvas.width; y = -enemySize; vx = (Math.random() - 0.5) * 2 * speed; vy = Math.random() * 2 + speed; }
            else if (side === 1) { x = canvas.width; y = Math.random() * canvas.height; vx = -(Math.random() * 2 + speed); vy = (Math.random() - 0.5) * 2 * speed; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height; vx = (Math.random() - 0.5) * 2 * speed; vy = -(Math.random() * 2 + speed); }
            else { x = -enemySize; y = Math.random() * canvas.height; vx = Math.random() * 2 + speed; vy = (Math.random() - 0.5) * 2 * speed; }
            enemies.push({ x, y, w: enemySize, h: enemySize, vx, vy, color: '#ff4444' });
        }

        function spawnPowerup() {
            powerups.push({
                x: Math.random() * (canvas.width - 20),
                y: Math.random() * (canvas.height - 20),
                w: 20,
                h: 20,
                color: '#00ff88'
            });
        }

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function update() {
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

            coinTimer++;
            if (coinTimer > 120) {
                spawnCoin();
                coinTimer = 0;
            }

            enemyTimer++;
            difficulty = 1 + Math.floor(score / 5) * 0.2;
            if (enemyTimer > Math.max(30, 90 - score * 2)) {
                spawnEnemy();
                enemyTimer = 0;
            }

            powerupTimer++;
            if (powerupTimer > 600) {
                spawnPowerup();
                powerupTimer = 0;
            }

            if (hasShield) {
                shieldTimer--;
                if (shieldTimer <= 0) hasShield = false;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;
                if (e.x < -50 || e.x > canvas.width + 50 || e.y < -50 || e.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                    continue;
                }
                if (player.x < e.x + e.w && player.x + player.w > e.x &&
                    player.y < e.y + e.h && player.y + player.h > e.y) {
                    lives--;
                    enemies.splice(i, 1);
                    if (lives <= 0) {
                        gameOver = true;
                    }
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (player.x < c.x + c.w && player.x + player.w > c.x &&
                    player.y < c.y + c.h && player.y + player.h > c.y) {
                    score++;
                    coins.splice(i, 1);
                }
            }
        }

        function drawBackground() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }

        function drawCoins() {
            coins.forEach(c => {
                ctx.fillStyle = c.color;
                ctx.fillRect(c.x, c.y, c.w, c.h);
            });
        }

        function drawEnemies() {
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.w, e.h);
            });
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        function drawLives() {
            ctx.fillStyle = '#ff6b6b';
            ctx.font = '20px Arial';
            ctx.fillText('Lives: ' + lives, 10, 60);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '20px Arial';
            ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Press SPACE to restart', canvas.width / 2, canvas.height / 2 + 60);
            ctx.textAlign = 'left';
        }

        function restart() {
            player.x = 280;
            player.y = 180;
            score = 0;
            lives = 3;
            coins.length = 0;
            enemies.length = 0;
            gameOver = false;
            spawnCoin();
        }

        window.addEventListener('keydown', e => {
            if (gameOver && e.key === ' ') {
                restart();
            }
        });

        function loop() {
            update();
            drawBackground();
            drawPlayer();
            drawCoins();
            drawEnemies();
            drawScore();
            drawLives();
            if (gameOver) {
                drawGameOver();
            } else {
                requestAnimationFrame(loop);
            }
        }

        loop();
    </script>
</body>
</html>
